port: /dev/tty.usbserial-FT9MISJT
version: 0.1.0
baudrate: 1000000
max_current: 300
type: right
control_mode: current_based_position
motor_ids:
- 1
- 2
- 3
- 4
- 5
- 6
- 7
- 8
- 9
joint_ids:
- index_pip
- thumb_mcp
- ring_index_mcp
- pinky_index_abd
- middle_mcp
- wrist
- thumb_cmc
- index_mcp
- thumb_abd
# Coupled joints:
#   ring_index_mcp   (motor 3) - coupled ring/index MCP
#   pinky_index_abd  (motor 4) - coupled pinky/index abduction
joint_to_motor_map:
  index_pip: 1
  thumb_mcp: 2
  ring_index_mcp: 3
  pinky_index_abd: 4
  middle_mcp: 5
  wrist: 6
  thumb_cmc: 7
  index_mcp: 8
  thumb_abd: 9
joint_roms:
  index_pip:
  - -15
  - 107
  thumb_mcp:
  - -60
  - 90
  ring_index_mcp:
  - -60
  - 100
  pinky_index_abd:
  - -30
  - 30
  middle_mcp:
  - -60
  - 100
  wrist:
  - -65
  - 35
  thumb_cmc:
  - -45
  - 33
  index_mcp:
  - -60
  - 100
  thumb_abd:
  - -18
  - 55
neutral_position:
  index_pip: 0
  thumb_mcp: 0
  ring_index_mcp: 0
  pinky_index_abd: 0
  middle_mcp: 0
  wrist: 0
  thumb_cmc: 0
  index_mcp: 0
  thumb_abd: 0
calib_current: 300
calib_step_size: 0.15
calib_step_period: 0.0001
calib_num_stable: 10
calib_threshold: 0.01
calib_sequence:
- step: 1
  joints:
    thumb_cmc: flex
- step: 2
  joints:
    thumb_cmc: extend
- step: 3
  joints:
    thumb_abd: flex
- step: 4
  joints:
    thumb_abd: extend
- step: 5
  joints:
    thumb_mcp: flex
- step: 6
  joints:
    thumb_mcp: extend
- step: 7
  joints:
    pinky_index_abd: flex
- step: 8
  joints:
    pinky_index_abd: extend
- step: 9
  joints:
    index_mcp: flex
- step: 10
  joints:
    index_mcp: extend
- step: 11
  joints:
    index_pip: flex
- step: 12
  joints:
    index_pip: extend
- step: 13
  joints:
    middle_mcp: flex
- step: 14
  joints:
    middle_mcp: extend
- step: 15
  joints:
    ring_index_mcp: flex
- step: 16
  joints:
    ring_index_mcp: extend
- step: 17
  joints:
    wrist: flex
- step: 18
  joints:
    wrist: extend
