# Reference calibration output for MockOrcaHand with v2/orcahand_right config.
#
# The mock motor client clamps all positions to [-1.0, 1.0], so every motor
# discovers limits of exactly [-1.0, 1.0]. Ratios follow from:
#
#     ratio = (hi_motor - lo_motor) / (hi_joint - lo_joint)
#           = 2.0 / (rom_hi - rom_lo)
#
# If any test in test_calibration_reference.py fails, calibration behavior
# has changed and needs to be investigated.
#
calibrated: true
wrist_calibrated: true
motor_limits:
  1: [-1.0, 1.0]
  2: [-1.0, 1.0]
  3: [-1.0, 1.0]
  4: [-1.0, 1.0]
